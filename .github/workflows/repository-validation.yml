name: Repository validation

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: repository-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate documentation and templates
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Fetch the exact repository revision
        shell: bash
        env:
          REPOSITORY: ${{ github.repository }}
          REF: ${{ github.ref }}
          SERVER_URL: ${{ github.server_url }}
        run: |
          set -euo pipefail
          git init --initial-branch=worktree .
          git remote add origin "${SERVER_URL}/${REPOSITORY}.git"
          git fetch --no-tags --depth=1 origin "${REF}"
          git checkout --detach FETCH_HEAD

      - name: Run validator unit tests
        run: |
          python3 -m unittest discover \
            -s tests \
            -p 'test_validate_repository.py' \
            -v

      - name: Validate repository content
        run: python3 scripts/validate_repository.py
